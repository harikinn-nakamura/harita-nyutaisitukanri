<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>入退室管理システム</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/UAParser.js/1.0.35/ua-parser.min.js"></script>
    
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f4f7f6; margin: 0; display: flex; justify-content: center; min-height: 100vh; color: #333; }
      .container { width: 100%; max-width: 400px; padding: 20px; box-sizing: border-box; text-align: center; background: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; position: relative; }
      h2 { margin-top: 20px; font-size: 1.4em; color: #444; }
      p { color: #666; margin-bottom: 20px; }
      
      .input-wrapper { position: relative; width: 100%; margin: 15px 0; display: block; }
      .input-wrapper input { width: 100%; padding: 14px; padding-right: 50px; font-size: 16px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; background-color: #fff; -webkit-appearance: none; appearance: none; transition: border 0.3s; }
      .input-wrapper input:focus { border-color: #007bff; }
      .toggle-eye { position: absolute; top: 0; right: 0; height: 100%; width: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #aaa; z-index: 100; -webkit-tap-highlight-color: transparent; }
      .toggle-eye svg { width: 24px; height: 24px; pointer-events: none; }
      input::-ms-reveal, input::-ms-clear { display: none; }
      
      button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
      button:active { background: #0056b3; }
      button:disabled { background: #ccc; cursor: not-allowed; }
      .secondary-btn { background: #6c757d; }
      .link-text { display: block; margin-top: 20px; color: #007bff; font-size: 0.9em; cursor: pointer; text-decoration: none; }
      .error-msg { color: #dc3545; font-size: 0.9em; margin-top: 15px; min-height: 1.2em; font-weight: bold; padding: 5px; background: #fff5f5; border-radius: 4px; display:none; }
      .notice-text { color: #d93025; font-weight: bold; font-size: 0.85em; margin-bottom: 15px; display: block; }
      .screen { display: none; width: 100%; }
      .active { display: block; animation: fadeIn 0.3s; }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      
      #canvas { width: 100%; border-radius: 8px; display: none; margin-bottom: 10px; background:#000;}
      .status-box { margin-top: 10px; padding: 15px; border-radius: 8px; width: 100%; box-sizing: border-box; display: none; }
      .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
      .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
      #qrcode-display { margin: 20px auto; display: flex; justify-content: center; align-items: center; padding: 15px; background: #fff; min-height: 200px; }
      #qrcode-display img { display: block; margin: 0 auto; }

      .mode-switch {
        display: flex; align-items: center; justify-content: center;
        background: #eee; padding: 8px 15px; border-radius: 20px;
        margin-bottom: 10px; width: fit-content; margin-left: auto; margin-right: auto;
        z-index: 10; position: relative;
      }
      .mode-switch input { margin-right: 8px; transform: scale(1.3); cursor: pointer; }
      .mode-switch label { font-weight: bold; color: #555; cursor: pointer; user-select: none; }

      #bigNotification {
        position: fixed; bottom: 0; left: 0; width: 100%;
        background-color: #28a745; color: white;
        padding: 30px 20px; text-align: center;
        box-shadow: 0 -4px 10px rgba(0,0,0,0.2);
        z-index: 1000; transform: translateY(100%); transition: transform 0.3s ease-out;
        display: none;
      }
      #bigNotification.show { display: block; transform: translateY(0); }
      #bigNotification.error-bg { background-color: #dc3545; }
      .big-title { font-size: 1.2em; margin-bottom: 5px; opacity: 0.9; }
      .big-name { font-size: 2em; font-weight: bold; line-height: 1.2; }
    </style>
  </head>
  <body>
    <div class="container">
      
      <div id="scannerScreen" class="screen">
        <h2>入退出スキャナー</h2>
        
        <div class="mode-switch">
          <input type="checkbox" id="continuousMode">
          <label for="continuousMode">連続スキャンモード</label>
        </div>

        <div id="loadingMessage">🎥 カメラを起動中...</div>
        <canvas id="canvas" hidden></canvas>
        
        <div id="statusBox" class="status-box">
          <div id="statusMessage" style="font-weight:bold; font-size:1.1em;"></div>
          <div id="statusTime" style="font-size:0.9em; margin-top:5px;"></div>
        </div>
        
        <button id="restartBtn" onclick="startScan()" style="display:none;">次の人をスキャン</button>
      </div>

      <div id="bigNotification">
        <div id="bigNotifyTitle" class="big-title">スキャン完了！</div>
        <div id="bigNotifyName" class="big-name"></div>
      </div>

      <div id="loginScreen" class="screen">
        <h2>本人確認</h2>
        <p>パスワードを入力してください</p>
        <div class="input-wrapper">
          <input type="password" id="loginPass" placeholder="パスワード" maxlength="10">
          <div class="toggle-eye" onclick="togglePassword('loginPass', this)">
            <svg class="eye-open" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            <svg class="eye-closed" style="display:none;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M1 1l22 22"></path></svg>
          </div>
        </div>
        <button id="loginBtn" onclick="doLogin()">QRコードを表示</button>
        <div id="loginError" class="error-msg"></div>
        <div style="margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px; width: 100%;">
          <span class="link-text" onclick="showChangePass()">パスワード変更</span>
          <span class="link-text" onclick="showForgot()">パスワードを忘れた方はこちら</span>
        </div>
      </div>

      <div id="cardScreen" class="screen">
        <p id="deptDisplay" style="margin-bottom:5px; font-weight:bold; color:#007bff;"></p>
        <h2 id="nameDisplay" style="margin-top:0; font-size:1.8em;"></h2>
        <div id="qrcode-display"></div>
        <p id="idDisplay" style="margin-top:10px; font-family:monospace; font-size:1.2em;"></p>
        <div style="font-size:0.8em; color:#aaa; margin-top:20px;">ホーム画面に追加してご利用ください</div>
        <span class="link-text" onclick="doLogout()" style="margin-top:30px;">ログアウト</span>
      </div>

      <div id="changeScreen" class="screen">
        <h2>パスワード変更</h2>
        <span class="notice-text">※大文字・小文字・英数字の3種類すべてを含む、4〜10桁が必須です</span>
        <div class="input-wrapper">
          <input type="password" id="currentPass" placeholder="現在のパスワード">
          <div class="toggle-eye" onclick="togglePassword('currentPass', this)">
             <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </div>
        </div>
        <div class="input-wrapper">
          <input type="password" id="newPass" placeholder="新しいパスワード(4-10桁)" maxlength="10">
          <div class="toggle-eye" onclick="togglePassword('newPass', this)">
             <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </div>
        </div>
        <button id="changeBtn" onclick="doChangePass()">変更を保存</button>
        <button class="secondary-btn" onclick="showLogin()">キャンセル</button>
        <div id="changeError" class="error-msg"></div>
      </div>

      <div id="forgotScreen" class="screen">
        <h2>パスワード再発行</h2>
        <p>管理者に通知メールを送信します。<br>よろしいですか？</p>
        <button id="forgotBtn" onclick="doForgotNotify()">管理者から連絡を受ける場合はこちら</button>
        <button class="secondary-btn" onclick="showLogin()">キャンセル</button>
        <div id="forgotError" class="error-msg"></div>
      </div>

      <div id="msgScreen" class="screen">
        <h2 id="msgTitle"></h2>
        <p id="msgBody"></p>
        <button onclick="showLogin()">戻る</button>
      </div>
    </div>

    <script>
      // ★★★重要：ここにGASでデプロイした「新APIのWebアプリURL」を貼り付けてください★★★
      const GAS_API_URL = "https://script.google.com/macros/s/YOUR_NEW_GAS_WEB_APP_ID/exec";

      // URLから kパラメータを取得し、モードを判定
      const urlParams = new URLSearchParams(window.location.search);
      const userKey = urlParams.get('k') || '';
      const mode = userKey ? 'LOGIN' : 'SCANNER';
      
      let currentUserData = null;
      let globalDeviceInfo = "端末情報取得中...";

      // GAS API呼び出し用ラッパー関数（fetch版）
      async function callGasApi(payload) {
        try {
          const response = await fetch(GAS_API_URL, {
            method: 'POST',
            // GASのCORSプリフライトを回避するため、必ず text/plain を使用する
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          });
          if (!response.ok) throw new Error("ネットワーク応答が正しくありません");
          return await response.json();
        } catch (error) {
          throw new Error(error.message);
        }
      }

      async function fetchDeviceInfo() {
        const parser = new UAParser();
        const result = parser.getResult();
        let os = result.os.name || "不明";
        let osVer = result.os.version || "";
        let browser = result.browser.name || "";
        let deviceType = "PC";
        let simpleModel = "";

        if (os === "Windows") os = "Windows PC";
        if (os === "Mac OS") os = "Apple Mac";
        if (os === "iOS") { os = "iPhone/iPad"; deviceType = "Mobile"; }
        if (os === "Android") { deviceType = "Mobile"; }

        if (result.device.model && result.device.model !== "K") {
          simpleModel = result.device.model;
          if (result.device.vendor) simpleModel = `${result.device.vendor} ${simpleModel}`;
        }

        let ipAddress = "[IP: 取得中]";
        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 3000);
          const ipResponse = await fetch('https://api.ipify.org?format=json', { signal: controller.signal });
          clearTimeout(timeoutId);
          if (ipResponse.ok) {
            const ipData = await ipResponse.json();
            ipAddress = `[IP: ${ipData.ip}]`;
          } else {
            ipAddress = "[IP: 取得不可]";
          }
        } catch (e) {
          ipAddress = e.name === 'AbortError' ? "[IP: タイムアウト]" : "[IP: エラー]";
        }

        let realModel = "";
        if (navigator.userAgentData && navigator.userAgentData.getHighEntropyValues) {
          try {
            const ua = await navigator.userAgentData.getHighEntropyValues(["model", "platformVersion"]);
            realModel = ua.model;
          } catch(e) {}
        }

        let finalInfo = `${os} ${osVer}`;
        if (realModel) finalInfo += ` [機種: ${realModel}]`;
        else if (simpleModel) finalInfo += ` [機種: ${simpleModel}]`;
        else if (deviceType === "PC") finalInfo += ` [ブラウザ: ${browser}]`;
        else finalInfo += ` [機種: 不明]`;

        finalInfo += ` ${ipAddress}`;
        globalDeviceInfo = finalInfo;
        console.log("Device Info:", globalDeviceInfo);
      }

      fetchDeviceInfo();

      window.onload = function() {
        if (mode === 'SCANNER') { showScreen('scannerScreen'); startCamera(); }
        else { showScreen('loginScreen'); }
      };

      function showScreen(id) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.error-msg').forEach(el => { el.style.display = 'none'; el.innerText = ''; });
      }
      function showError(elementId, msg) {
        const el = document.getElementById(elementId);
        el.innerText = msg;
        el.style.display = 'block';
      }
      function togglePassword(inputId, iconDiv) {
        const input = document.getElementById(inputId);
        const openIcon = iconDiv.querySelector('.eye-open') || iconDiv.querySelector('svg');
        const closedIcon = iconDiv.querySelector('.eye-closed');
        if (input.type === "password") { input.type = "text"; iconDiv.style.color = "#007bff"; if(closedIcon) { openIcon.style.display='none'; closedIcon.style.display='block'; } }
        else { input.type = "password"; iconDiv.style.color = "#aaa"; if(closedIcon) { openIcon.style.display='block'; closedIcon.style.display='none'; } }
      }

      // ★ API駆動に変更：doLogin
      async function doLogin() {
        const pass = document.getElementById('loginPass').value;
        const btn = document.getElementById('loginBtn');
        if (!pass) { showError('loginError', 'パスワードを入力してください'); return; }
        
        btn.disabled = true; btn.innerText = "確認中...";
        try {
          const res = await callGasApi({ action: 'login', key: userKey, pass: pass, userAgent: globalDeviceInfo });
          btn.disabled = false; btn.innerText = "QRコードを表示";
          if (res.success) { 
            currentUserData = res.employee; 
            showScreen('cardScreen'); 
            setTimeout(renderCard, 200); 
          } else { 
            showError('loginError', res.message); 
          }
        } catch (e) {
          btn.disabled = false; btn.innerText = "QRコードを表示"; 
          showError('loginError', 'システムエラー: ' + e.message);
        }
      }

      // ★ API駆動に変更：doLogout
      async function doLogout() { 
        try {
          await callGasApi({ action: 'logout', key: userKey, userAgent: globalDeviceInfo });
        } catch(e) { console.error(e); }
        setTimeout(function(){ location.reload(); }, 500); 
      }

      function renderCard() {
        document.getElementById('deptDisplay').innerText = currentUserData.dept || '';
        document.getElementById('nameDisplay').innerText = currentUserData.name;
        document.getElementById('idDisplay').innerText = 'ID: ' + currentUserData.id;
        const qrContainer = document.getElementById('qrcode-display');
        qrContainer.innerHTML = ''; 
        
        try { new QRCode(qrContainer, { text: currentUserData.scanToken, width: 200, height: 200, colorDark : "#000000", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H }); }
        catch(e) { qrContainer.innerText = "QR生成失敗"; }
      }

      // ★ API駆動に変更：doChangePass
      async function doChangePass() {
        const cur = document.getElementById('currentPass').value;
        const newP = document.getElementById('newPass').value;
        const btn = document.getElementById('changeBtn');
        if (!cur || !newP) { showError('changeError', 'すべての項目を入力してください'); return; }

        const hasUpper = /[A-Z]/.test(newP);
        const hasLower = /[a-z]/.test(newP);
        const hasNumber = /[0-9]/.test(newP);
        const isValidLength = newP.length >= 4 && newP.length <= 10;

        if (!isValidLength || !hasUpper || !hasLower || !hasNumber) {
           showError('changeError', 'パスワードは4〜10桁で、英大文字・英小文字・数字をすべて含めてください'); 
           return; 
        }

        btn.disabled = true; btn.innerText = "変更中...";
        try {
          const res = await callGasApi({ action: 'changePassword', key: userKey, currentPass: cur, newPass: newP, userAgent: globalDeviceInfo });
          btn.disabled = false; btn.innerText = "変更を保存";
          if (res.success) { 
            document.getElementById('loginPass').value = ''; 
            document.getElementById('currentPass').value = ''; 
            document.getElementById('newPass').value = ''; 
            document.getElementById('msgTitle').innerText = '変更完了'; 
            document.getElementById('msgBody').innerText = 'パスワードが変更されました。\n新しいパスワードでログインしてください。'; 
            showScreen('msgScreen'); 
          } else { 
            showError('changeError', res.message); 
          }
        } catch (e) {
          btn.disabled = false; btn.innerText = "変更を保存"; 
          showError('changeError', 'エラー: ' + e.message);
        }
      }

      // ★ API駆動に変更：doForgotNotify
      async function doForgotNotify() {
        const btn = document.getElementById('forgotBtn');
        btn.disabled = true; btn.innerText = "処理中...";
        try {
          const res = await callGasApi({ action: 'sendForgotMail', key: userKey, userAgent: globalDeviceInfo });
          btn.disabled = false; btn.innerText = "管理者から連絡を受ける場合はこちら";
          if (res.success) { 
            document.getElementById('msgTitle').innerText = '通知しました'; 
            document.getElementById('msgBody').innerText = '管理者から連絡いたします。\nしばらくお待ちください。'; 
            showScreen('msgScreen'); 
          } else { 
            showError('forgotError', res.message); 
          }
        } catch(e) {
          btn.disabled = false; btn.innerText = "管理者から連絡を受ける場合はこちら"; 
          showError('forgotError', 'エラー: ' + e.message);
        }
      }

      function showLogin() { showScreen('loginScreen'); }
      function showChangePass() { showScreen('changeScreen'); }
      function showForgot() { showScreen('forgotScreen'); }

      // --- スキャナーロジック ---
      const video = document.createElement("video");
      const canvasElement = document.getElementById("canvas");
      const canvas = canvasElement.getContext("2d");
      const loadingMessage = document.getElementById("loadingMessage");
      const statusBox = document.getElementById("statusBox");
      const restartBtn = document.getElementById("restartBtn");
      
      const bigNotification = document.getElementById("bigNotification");
      const bigNotifyTitle = document.getElementById("bigNotifyTitle");
      const bigNotifyName = document.getElementById("bigNotifyName");
      const continuousCheck = document.getElementById("continuousMode");

      let isScanning = false;

      function startCamera() {
        isScanning = true;
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function(stream) {
          video.srcObject = stream;
          video.setAttribute("playsinline", true);
          video.play();
          requestAnimationFrame(tick);
        });
      }

      function startScan() {
        statusBox.style.display = "none";
        restartBtn.style.display = "none";
        hideBigNotification();
        loadingMessage.hidden = false;
        canvasElement.hidden = true; 
        startCamera();
      }

      function showBigNotification(title, name, isError = false) {
        bigNotifyTitle.innerText = title;
        bigNotifyName.innerText = name;
        bigNotification.className = isError ? 'error-bg show' : 'show';
      }

      function hideBigNotification() {
        bigNotification.className = '';
      }

      function tick() {
        if (!isScanning) return;
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
          loadingMessage.hidden = true;
          canvasElement.hidden = false;
          canvasElement.style.display = "inline-block";
          canvasElement.height = video.videoHeight;
          canvasElement.width = video.videoWidth;
          canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
          const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
          const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });

          if (code) {
            isScanning = false;
            
            statusBox.style.display = "block";
            statusBox.className = "status-box";
            document.getElementById("statusMessage").innerText = "データを照合中...";
            
            // ★ API駆動に変更：スキャン通信
            callGasApi({ action: 'recordTime', scanData: code.data })
              .then(onScanSuccess)
              .catch(onScanFailure);
          }
        }
        if (isScanning) requestAnimationFrame(tick);
      }

      function onScanSuccess(result) {
        if (result.status === 'success') {
          const type = result.mode === 'IN' ? '【入】' : '【退出】';
          const displayText = type + " " + result.name;
          
          statusBox.className = "status-box success";
          document.getElementById("statusMessage").innerText = displayText;
          document.getElementById("statusTime").innerText = result.time;

          if (continuousCheck.checked) {
            showBigNotification("スキャン完了！", result.name + "さま", false);
            setTimeout(startScan, 1000); 
          } else {
            restartBtn.style.display = "inline-block";
          }
        } else {
          statusBox.className = "status-box error";
          document.getElementById("statusMessage").innerText = "エラー";
          document.getElementById("statusTime").innerText = result.message;
          
          if (continuousCheck.checked) {
            showBigNotification("エラー", result.message, true);
            setTimeout(startScan, 2000);
          } else {
            restartBtn.style.display = "inline-block";
          }
        }
      }

      function onScanFailure(e) {
        statusBox.className = "status-box error";
        document.getElementById("statusMessage").innerText = "システムエラー";
        document.getElementById("statusTime").innerText = e.message;
        
        if (continuousCheck.checked) {
           showBigNotification("通信エラー", "リトライします...", true);
           setTimeout(startScan, 3000); 
        } else {
           restartBtn.style.display = "inline-block";
        }
      }
    </script>
  </body>
</html>
